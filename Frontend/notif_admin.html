<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications Admin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col">
      <div class="p-4 text-center font-bold text-xl border-b border-blue-700 flex items-center justify-between">
        <span class="flex-1 text-left">John Doe</span>
        <img src="./assets/icons/icon1.png" alt="Admin Icon" class="w-12 h-12 rounded-full">
      </div>
      <nav class="flex-1 p-4">
        <ul class="space-y-4">
          <li><a href="admin.html" class="block px-4 py-2 rounded hover:bg-blue-700"><i class="fas fa-users"></i> Gestion des Utilisateurs</a></li>
          <li><a href="notif_admin.html" class="block px-4 py-2 rounded bg-blue-700"><i class="fas fa-bell"></i> Notifications</a></li>
          <li><a href="settings_admin.html" class="block px-4 py-2 rounded hover:bg-blue-700"><i class="fas fa-cogs"></i> Paramètres</a></li>
          <li><a href="index.html" class="block px-4 py-2 rounded hover:bg-blue-700"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Contenu principal -->
    <main class="flex-1 p-8">
      <h1 class="text-3xl font-bold mb-6">Notifications</h1>

      <!-- Liste des notifications -->
      <div id="notificationsContainer" class="space-y-4">
        <!-- Exemple de notification -->
        <div class="bg-white p-4 rounded shadow flex justify-between items-center">
          <div>
            <p class="text-gray-800 font-semibold">Nouvelle demande d’inscription</p>
            <p class="text-gray-500 text-sm">Utilisateur: <strong>Ali Touré</strong> - il y a 5 minutes</p>
          </div>
          <div class="flex space-x-2">
            <button class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-sm">Marquer comme lue</button>
            <button class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 text-sm">Supprimer</button>
          </div>
        </div>
        <!-- Tu pourras injecter dynamiquement d’autres notifs ici via JS -->
      </div>
    </main>
  </div>

  <script src="script/notif_admin.js"></script>
</body>
</html>
